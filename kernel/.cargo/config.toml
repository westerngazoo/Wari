[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    # `-Tlinker.ld` is injected by build.rs with an absolute path so
    # the kernel links correctly both from the workspace root and from
    # `cd kernel && cargo build`.
    "-C", "force-frame-pointers=yes",   # debuggability
]
